prompt = """
Search Nowledge Mem for the user's query: `{{args}}`.

Workflow:

1. Rewrite the request into a short retrieval query rather than copying a long prompt verbatim.
2. Start with `nmem --json m search` for distilled knowledge.
3. If the user is asking about a prior conversation, previous session, or exact discussion, or if memory search is weak, use `nmem --json t search` too.
4. If a memory result includes `source_thread` or thread search returns a strong hit, inspect that conversation with `nmem --json t show <thread_id> --limit 8 --offset 0 --content-limit 1200` and page further only when needed.
5. If the recall need is conceptual, historical, or the first memory search is weak, run a second pass with `--mode deep`.
6. Add filters only when the task clearly implies them:
   - labels for project or domain scoping
   - `--importance` for high-signal recall
   - `--event-from` / `--recorded-from` when time matters
7. Summarize only the strongest matches, mention memory ids or source threads when helpful, and clearly say when nothing relevant was found.

Prefer precise retrieval queries over raw prompts. Use direct `nmem` composition freely when the bundled command shape is not enough.
"""
