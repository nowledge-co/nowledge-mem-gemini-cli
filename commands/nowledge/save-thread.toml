prompt = """
Save the real Gemini CLI session to Nowledge Mem.

This command should persist the actual Gemini session messages, not a summary-only checkpoint.

Workflow:

1. Write a short 1-2 sentence summary of what was accomplished.
2. Use the shell tool to run `nmem --json t save --from gemini-cli -p . -s "<summary>"`.
3. If the user clearly wants a specific older Gemini session, add `--session-id`.
4. Report whether the thread was created or updated, how many messages were stored, and the thread id.
5. If no Gemini session is found, explain that plainly and suggest `/nowledge:save-handoff` only when the user wants a manual resumable summary instead.

Do not replace thread-save with `t create`. `save-thread` means importing the recorded Gemini session.
"""
